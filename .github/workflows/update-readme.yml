name: Update README

on:
  push:
    branches: [main]
    paths:
      - ".github/scripts/generate-readme.ts"
      - ".github/scripts/generate-projects.ts"
      - ".github/workflows/update-readme.yml"
      - "published-apps.json"
      - "assets/**"
  schedule:
    - cron: "0 2 * * *" # Every night at 02:00 UTC (3am CET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun .github/scripts/generate-readme.ts

      - name: Generate projects.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun .github/scripts/generate-projects.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/ projects.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update README and projects.json"
          git push
